name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild build \
            -scheme Sip \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Locate .app
        id: app
        run: |
          APP_PATH=$(find build -name "Sip.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Sip.app not found"
            exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          set -euo pipefail

          APP_PATH="${{ steps.app.outputs.path }}"
          DMG_NAME="Sip.dmg"
          VOLUME_NAME="Sip"
          # Window content size must match `.github/dmg_background.png` (660×400).
          # bounds = {left, top, right, bottom} → width 660, height 400
          BG_SRC="${GITHUB_WORKSPACE}/.github/dmg_background.png"

          if [ ! -f "$BG_SRC" ]; then
            echo "Missing DMG background: $BG_SRC"
            exit 1
          fi

          # Build a read-write disk image large enough for the app + background.
          RW_DMG="template.dmg"
          rm -f "$RW_DMG" "$DMG_NAME"
          hdiutil create \
            -size 100m \
            -fs HFS+ \
            -volname "$VOLUME_NAME" \
            -ov \
            "$RW_DMG"

          # Mount read-write
          MOUNT_OUTPUT=$(hdiutil attach -readwrite -noverify -noautoopen "$RW_DMG")
          echo "$MOUNT_OUTPUT"
          MOUNT_DIR=$(echo "$MOUNT_OUTPUT" | grep -E '/Volumes/' | sed -E 's/.*(\/Volumes\/.*)/\1/' | tail -1)
          if [ -z "$MOUNT_DIR" ] || [ ! -d "$MOUNT_DIR" ]; then
            echo "Failed to mount $RW_DMG"
            exit 1
          fi
          echo "Mounted at: $MOUNT_DIR"

          cleanup() {
            hdiutil detach "$MOUNT_DIR" -force 2>/dev/null || true
          }
          trap cleanup EXIT

          # App + Applications symlink (classic drag-to-install)
          cp -R "$APP_PATH" "$MOUNT_DIR/Sip.app"
          ln -s /Applications "$MOUNT_DIR/Applications"

          # Background must live ON the volume (HFS path `.background:background.png`).
          mkdir -p "$MOUNT_DIR/.background"
          cp "$BG_SRC" "$MOUNT_DIR/.background/background.png"
          # Hide support files from the icon grid when possible.
          if command -v SetFile >/dev/null 2>&1; then
            SetFile -a V "$MOUNT_DIR/.background" || true
          fi
          chflags hidden "$MOUNT_DIR/.background" 2>/dev/null || true

          # Style Finder window: icon layout + branded background + drag hint.
          # Positions align with arrow drawn on the background (centers ~180 / ~480, y~200).
          osascript <<APPLESCRIPT
          tell application "Finder"
            tell disk "$VOLUME_NAME"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {200, 120, 860, 520}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 96
              set background picture of viewOptions to file ".background:background.png"
              set position of item "Sip.app" of container window to {180, 200}
              set position of item "Applications" of container window to {480, 200}
              -- Keep support folder off-canvas if Finder still lists it
              try
                set position of item ".background" of container window to {1000, 1000}
              end try
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          APPLESCRIPT

          # Ensure .DS_Store (view settings) is flushed before eject.
          sync
          sleep 1

          # Detach cleanly (disable trap first so convert is not blocked)
          trap - EXIT
          hdiutil detach "$MOUNT_DIR" -force
          sleep 1

          # Compress for distribution
          hdiutil convert "$RW_DMG" \
            -format UDZO \
            -imagekey zlib-level=9 \
            -o "$DMG_NAME"

          rm -f "$RW_DMG"
          ls -lh "$DMG_NAME"

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          files: Sip.dmg
          body: |
            ## Sip ${{ steps.version.outputs.tag }}

            ### 安装说明

            1. 下载 `Sip.dmg`
            2. 双击打开，**将 Sip 拖入 Applications 文件夹**（窗口内有箭头指引）
            3. 首次打开时，**右键 → 打开**（或在终端运行以下命令后双击打开）：
               ```bash
               xattr -cr /Applications/Sip.app
               ```
            4. 如果提示通知权限，点击「允许」

            ### Install

            1. Download `Sip.dmg`
            2. Open it and **drag Sip into Applications**
            3. On first launch, **right-click → Open**, or run:
               ```bash
               xattr -cr /Applications/Sip.app
               ```
            4. Allow notifications when prompted
