name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild build \
            -scheme Sip \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Locate .app
        id: app
        run: |
          APP_PATH=$(find build -name "Sip.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Sip.app not found"
            exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          APP_PATH="${{ steps.app.outputs.path }}"
          DMG_NAME="Sip.dmg"
          STAGING_DIR=$(mktemp -d)
          VOLUME_NAME="Sip"

          # Copy .app and create Applications symlink
          cp -R "$APP_PATH" "$STAGING_DIR/Sip.app"
          ln -s /Applications "$STAGING_DIR/Applications"

          # Create sparse DMG
          hdiutil create -volname "$VOLUME_NAME" \
            -srcfolder "$STAGING_DIR" \
            -format UDRW \
            -fs HFS+ \
            "template.dmg"

          # Mount, style with AppleScript, then convert
          MOUNT_DIR=$(hdiutil attach -readwrite -noverify "template.dmg" | grep "/Volumes/$VOLUME_NAME" | awk '{print $NF}')

          osascript <<APPLESCRIPT
          tell application "Finder"
            tell disk "$VOLUME_NAME"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {200, 120, 860, 460}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 96
              set background picture of viewOptions to file ".github:dmg_background.png"
              set position of item "Sip.app" of container window to {180, 170}
              set position of item "Applications" of container window to {480, 170}
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          APPLESCRIPT

          # Force eject
          hdiutil detach "$MOUNT_DIR" -force

          # Convert to compressed DMG
          hdiutil convert "template.dmg" \
            -format UDZO \
            -imagekey zlib-level=9 \
            -o "$DMG_NAME"

          rm -f "template.dmg"
          rm -rf "$STAGING_DIR"

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          files: Sip.dmg
          body: |
            ## Sip ${{ steps.version.outputs.tag }}

            ### 安装说明

            1. 下载 `Sip.dmg`
            2. 双击打开，将 Sip 拖入 Applications 文件夹
            3. 首次打开时，**右键 → 打开**（或在终端运行以下命令后双击打开）：
               ```bash
               xattr -cr /Applications/Sip.app
               ```
            4. 如果提示通知权限，点击「允许」
