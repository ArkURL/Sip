name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild build \
            -scheme Sip \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Locate .app
        id: app
        run: |
          APP_PATH=$(find build -name "Sip.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Sip.app not found"
            exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          hdiutil create -volname "Sip" \
            -srcfolder "${{ steps.app.outputs.path }}" \
            -ov -format UDZO \
            "Sip.dmg"

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          files: Sip.dmg
          body: |
            ## Sip ${{ steps.version.outputs.tag }}

            ### 安装说明

            1. 下载 `Sip.dmg`
            2. 双击打开，将 Sip 拖入 Applications 文件夹
            3. 首次打开时，**右键 → 打开**（或在终端运行以下命令后双击打开）：
               ```bash
               xattr -cr /Applications/Sip.app
               ```
            4. 如果提示通知权限，点击「允许」
